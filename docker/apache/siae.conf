# siae.conf
# Configuracion de Apache dentro del contenedor Docker
# Mantiene la misma URL base que XAMPP: /ProgWeb/siae-imss/

<VirtualHost *:80>

    # Directorio raiz del servidor Apache
    DocumentRoot /var/www/html

    # Alias que mapea /ProgWeb/siae-imss/ al directorio de la aplicacion
    # Esto hace que la URL sea identica a XAMPP sin cambiar nada en el codigo
    Alias /ProgWeb/siae-imss /var/www/html

    # Permisos y configuracion del directorio de la aplicacion
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All        # permite que .htaccess funcione
        Require all granted
    </Directory>

    # Redirige / a la ruta base del sistema
    RedirectMatch ^/$ /ProgWeb/siae-imss/

    # Archivos de log de Apache
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>
