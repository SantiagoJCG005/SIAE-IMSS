; php.ini
; Configuracion personalizada de PHP para el contenedor Docker de SIAE-IMSS

[Date]
; Zona horaria de Mexico (igual que en XAMPP)
date.timezone = America/Mexico_City

[PHP]
; Tamano maximo de archivos que se pueden subir (Excel de alumnos)
upload_max_filesize = 20M
post_max_size       = 20M

; Memoria maxima por peticion
memory_limit = 256M

; Tiempo maximo de ejecucion en segundos
max_execution_time = 60

; Muestra errores en desarrollo (cambiar a Off en produccion)
display_errors = On
error_reporting = E_ALL

; Asegura que $_ENV se llene con las variables de entorno del contenedor
variables_order = "EGPCS"
